<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Blog Website</h1>

    <nav>
        <a href="index.html">Home</a> |
        <a href="blog.html">Blog</a>
    </nav>

    <hr>
</header>

<main>

    <h2>All Blogs</h2>

    <div id="blogList"></div>

</main>

<footer>
    <hr>
    <p>© 2026 My Blog Website</p>
</footer>

<script>
fetch('/blogs')
.then(response => response.json())
.then(data => {

    let output = "";

    data.forEach(blog => {
        output += `
            <h3>${blog.title}</h3>
            <p>${blog.content}</p>
            <hr>
        `;
    });

    document.getElementById("blogList").innerHTML = output;

});
</script>

</body>j
</html>
